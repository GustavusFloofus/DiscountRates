<div id="calc-body-content" style="display: none;">
  
  <div class="calc-toolbar">
    <div class="calc-input-group">
      <label for="calc-date">Stichtag:</label>
      <input type="date" id="calc-date">
    </div>
    <div class="calc-input-group">
      <label for="calc-duration-type">Durationart:</label>
      <select id="calc-duration-type">
        <option value="Individual">Individual</option>
        <option value="Pauschal">Pauschal</option>
      </select>
    </div>
    <div class="calc-input-group">
      <label for="calc-duration">Duration (in Jahren):</label>
      <input type="number" id="calc-duration" value="4" min="1" max="50" step="1">
    </div>
  </div>
  
  <div class="calc-toolbar excel-toolbar">
    <div class="calc-input-group" style="justify-content: flex-end;">
      <button class="btn btn-excel" onclick="exportCalcToExcel()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg> Excel generieren
      </button>
    </div>
  </div>
  
  <div class="toolbar" style="margin-bottom:15px; padding-bottom:15px; border-bottom: none;">
    <button class="btn" onclick="alert('iBoxx-Chart Feature folgt in Kürze')">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg> iBoxx-Chart Generieren
    </button>
    <button class="btn" onclick="document.getElementById('import-excel').click()">
      <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg> Excel mit Import Updaten
    </button>
    <input type="file" id="import-excel" style="display:none" accept=".xlsx">
    <button class="btn" id="btn-copy-disclaimer" onclick="copyDisclaimer(this)">
      <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Disclaimer kopieren
    </button>
  </div>
